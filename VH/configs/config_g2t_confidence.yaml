experiment_name: "g2t_confidence_pseudogloss"
seed: 42

paths:
  phoenix_root: "/datastore/cndt_phungdtm/KLTN_HoangBinh/Dataset/PHOENIX-2014-T"
  frames_root: "/datastore/cndt_phungdtm/KLTN_HoangBinh/Dataset/PHOENIX-2014-T/features/fullFrame-210x260px"
  annot_root: "/datastore/cndt_phungdtm/KLTN_HoangBinh/Dataset/PHOENIX-2014-T/annotations/manual"
  checkpoint_dir: "checkpoints_g2t_slt"
  log_dir: "logs_g2t_slt"

data:
  num_workers: 2

predicted_gloss:
  train:
  dev:
  test:

g2t_slt:
  # Keep training fast: train G2T from annotation gloss, evaluate on predicted gloss.
  train_source: "gt"
  batch_size: 64
  eval_batch_size: 96
  num_epochs: 50
  grad_accumulation_steps: 1

  learning_rate: 3.0e-4
  eta_min: 1.0e-6
  warmup_steps: 200
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  gradient_clip: 1.0
  use_amp: true

  d_model: 256
  nhead: 4
  num_encoder_layers: 3
  num_decoder_layers: 3
  dim_feedforward: 1024
  dropout: 0.1
  max_src_len: 128
  max_tgt_len: 128

  # CAPG-G2T: Confidence-Aware Pseudo-Gloss G2T.
  # This keeps the ADAT-inspired local/global gate and Gloss2Text-style
  # domain prefix, then prepends a CSLR confidence token to the gloss stream.
  domain_prefix_len: 1
  use_weather_slots: true
  use_conv_gate: true
  use_confidence_token: true

  # During GT-gloss training, randomly expose the model to low/mid/high
  # confidence prefixes and light gloss corruption. This is cheap and makes
  # the decoder less brittle when Swin-T CTC predicted gloss is noisy.
  confidence_augmentation:
    enabled: true
    train_bucket_probs:
      low: 0.15
      mid: 0.35
      high: 0.50
    drop_token_prob:
      low: 0.08
      mid: 0.04
      high: 0.01
    unk_token_prob:
      low: 0.04
      mid: 0.02
      high: 0.00

  early_stopping:
    enabled: true
    patience: 8
    metric: "BLEU-4"
